<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB 閱讀器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <!-- 檔案上傳區域 -->
    <div id="uploadArea" class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto">
            <div class="card">
                <div class="card__body text-center">
                    <h1 class="text-2xl font-bold mb-6">EPUB 閱讀器</h1>
                    <input type="file" id="epubFile" accept=".epub" class="hidden">
                    <button id="uploadBtn" class="btn btn--primary btn--full-width mb-4">
                        選擇 EPUB 檔案
                    </button>
                    <div id="uploadStatus" class="text-sm text-gray-600 dark:text-gray-400"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 閱讀器主介面 -->
    <div id="readerArea" class="hidden">
        <!-- 頂部工具列 -->
        <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button id="backToUpload" class="btn btn--secondary btn--sm">
                        ← 返回
                    </button>
                    <h2 id="bookTitle" class="text-lg font-semibold truncate max-w-xs"></h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="tocBtn" class="btn btn--secondary btn--sm">目錄</button>
                    <button id="bookmarkBtn" class="btn btn--secondary btn--sm">書籤</button>
                    <button id="settingsBtn" class="btn btn--secondary btn--sm">設定</button>
                </div>
            </div>
        </div>

        <!-- 閱讀內容區域 -->
        <div class="flex-1 relative">
            <div id="epubViewer" class="epub-viewer"></div>
            
            <!-- 載入中提示 -->
            <div id="loadingMessage" class="absolute inset-0 flex items-center justify-center bg-white dark:bg-gray-900 bg-opacity-90">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto mb-2"></div>
                    <p class="text-gray-600 dark:text-gray-400">正在載入書籍，請稍候...</p>
                </div>
            </div>

            <!-- 未載入書籍提示 -->
            <div id="noBookMessage" class="absolute inset-0 flex items-center justify-center bg-white dark:bg-gray-900 hidden">
                <p class="text-gray-600 dark:text-gray-400">未載入書籍</p>
            </div>
        </div>

        <!-- 底部導航 -->
        <div class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 px-4 py-3">
            <div class="flex items-center justify-between">
                <button id="prevBtn" class="btn btn--secondary" disabled>上一頁</button>
                <div id="pageInfo" class="text-sm text-gray-600 dark:text-gray-400"></div>
                <button id="nextBtn" class="btn btn--secondary" disabled>下一頁</button>
            </div>
        </div>
    </div>

    <!-- 目錄側邊欄 -->
    <div id="tocSidebar" class="fixed inset-y-0 left-0 w-80 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full transition-transform duration-300 z-50">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold">目錄</h3>
            <button id="closeToc" class="btn btn--secondary btn--sm">×</button>
        </div>
        <div id="tocContent" class="overflow-y-auto h-full pb-16"></div>
    </div>

    <!-- 書籤側邊欄 -->
    <div id="bookmarkSidebar" class="fixed inset-y-0 right-0 w-80 bg-white dark:bg-gray-800 border-l border-gray-200 dark:border-gray-700 transform translate-x-full transition-transform duration-300 z-50">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-semibold">書籤</h3>
            <button id="closeBookmarks" class="btn btn--secondary btn--sm">×</button>
        </div>
        <div class="p-4">
            <button id="addBookmark" class="btn btn--primary btn--full-width mb-4">新增書籤</button>
            <div id="bookmarksList" class="space-y-2 overflow-y-auto"></div>
        </div>
    </div>

    <!-- 設定面板 -->
    <div id="settingsPanel" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">閱讀器設定</h3>
                <button id="closeSettings" class="btn btn--secondary btn--sm">×</button>
            </div>
            
            <div class="space-y-4">
                <!-- 字體選擇 -->
                <div class="form-group">
                    <label class="form-label">字體</label>
                    <select id="fontFamily" class="form-control">
                        <option value="Inter">Inter (預設)</option>
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Noto Sans TC">Noto Sans TC (思源黑體)</option>
                        <option value="Noto Serif TC">Noto Serif TC (思源宋體)</option>
                    </select>
                </div>

                <!-- 字體大小 -->
                <div class="form-group">
                    <label class="form-label">字體大小</label>
                    <input type="range" id="fontSize" min="12" max="24" value="16" class="w-full">
                    <div class="text-sm text-gray-600 dark:text-gray-400 mt-1">
                        <span id="fontSizeValue">16px</span>
                    </div>
                </div>

                <!-- 行距 -->
                <div class="form-group">
                    <label class="form-label">行距</label>
                    <input type="range" id="lineHeight" min="1.2" max="2.5" step="0.1" value="1.6" class="w-full">
                    <div class="text-sm text-gray-600 dark:text-gray-400 mt-1">
                        <span id="lineHeightValue">1.6</span>
                    </div>
                </div>

                <!-- 邊距 -->
                <div class="form-group">
                    <label class="form-label">邊距</label>
                    <input type="range" id="margin" min="10" max="50" value="20" class="w-full">
                    <div class="text-sm text-gray-600 dark:text-gray-400 mt-1">
                        <span id="marginValue">20px</span>
                    </div>
                </div>

                <!-- 背景顏色 -->
                <div class="form-group">
                    <label class="form-label">背景顏色</label>
                    <select id="backgroundColor" class="form-control">
                        <option value="#ffffff">白色</option>
                        <option value="#f8f9fa">淺灰</option>
                        <option value="#f5f5dc">米色</option>
                        <option value="#2d3748">深色</option>
                        <option value="#1a202c">純黑</option>
                    </select>
                </div>

                <!-- 文字顏色 -->
                <div class="form-group">
                    <label class="form-label">文字顏色</label>
                    <select id="textColor" class="form-control">
                        <option value="#1f2937">深色</option>
                        <option value="#4a5568">中等</option>
                        <option value="#718096">淺色</option>
                        <option value="#e2e8f0">淺白</option>
                        <option value="#ffffff">純白</option>
                    </select>
                </div>

                <!-- 夜間模式 -->
                <div class="form-group">
                    <label class="flex items-center">
                        <input type="checkbox" id="darkMode" class="mr-2">
                        夜間模式
                    </label>
                </div>

                <!-- 重置按鈕 -->
                <button id="resetSettings" class="btn btn--outline btn--full-width">重置設定</button>
            </div>
        </div>
    </div>

    <!-- 遮罩層 -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>

    <script src="app.js"></script>
</body>
</html>
